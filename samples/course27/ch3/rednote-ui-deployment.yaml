# 定义部署Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rednote-ui
  namespace: rednote
  labels:
    app: rednote-ui
spec:
  replicas: 1 # 副本数
  selector:
    matchLabels:
      app: rednote-ui
  strategy:
    type: RollingUpdate # 滚动更新
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rednote-ui
    spec:
      containers:
        - name: rednote-ui
          image: rednote-ui:1.0.0
          imagePullPolicy: Never  # 使用本地镜像
          ports:
            - containerPort: 80
              protocol: TCP
          # 资源限制
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi    
---
# 定义服务Service
apiVersion: v1
kind: Service
metadata:
  name: rednote-ui
  namespace: rednote
spec:
  type: NodePort
  selector:
    app: rednote-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
      protocol: TCP
