# 定义命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: rednote
---
# 定义部署Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rednote-gateway-microservice
  namespace: rednote
  labels:
    app: rednote-gateway
spec:
  replicas: 1 # 副本数
  selector:
    matchLabels:
      app: rednote-gateway
  strategy:
    type: RollingUpdate # 滚动更新
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rednote-gateway
    spec:
      containers:
        - name: rednote-gateway-microservice
          image: rednote-gateway-microservice:1.0.0
          imagePullPolicy: Never  # 使用本地镜像
          ports:
            - containerPort: 8080
              protocol: TCP
          # 资源限制
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi    
---
# 定义服务Service
apiVersion: v1
kind: Service
metadata:
  name: rednote-gateway-microservice
  namespace: rednote
spec:
  type: NodePort
  selector:
    app: rednote-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP